name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'   # all GH Actions pin Node 24 (satisfies n8n-node's >= 22.22 floor)
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint (n8n-node lint, strict mode)
        run: npm run lint

      - name: Unit tests (vitest, pure cores — Principle 10)
        run: npm test

      - name: Build
        run: npm run build

      # Confirms the published tarball is LICENSE + README + dist only
      # (guards the incremental-build trap from the gotchas).
      - name: Pack check
        run: npm pack --dry-run

      # NOTE: `@n8n/scan-community-package` is intentionally NOT run here — it scans the
      # PUBLISHED npm package (fetches from registry.npmjs.org) and 404s on an unpublished
      # version, so it can only run post-publish. It lives in publish.yml's `scan` job.

  # Optional: dual-path execution test in a real n8n container.
  # Enable once you have harness workflows committed under test/.
  # harness:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: ./scripts/harness.sh --ci
