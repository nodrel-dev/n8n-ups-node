# Local guardrails. Installed by `npx lefthook install`.
# Lint + conventional-commit checks stay on commit (cheap).
# The full verification scan runs on push (heavy), and uses `npx --yes`
# so it never blocks on an interactive install prompt.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,js,json}'
      run: npm run lint

commit-msg:
  commands:
    commitlint:
      run: npx --yes commitlint --edit {1}

pre-push:
  commands:
    scan:
      # n8n's verification gate (same check the Creator Portal runs).
      run: npx --yes @n8n/scan-community-package "$(node -p "require('./package.json').name")"
