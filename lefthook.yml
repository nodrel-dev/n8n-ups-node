# Local guardrails. Installed by `npx lefthook install`.
#
# Note: @n8n/scan-community-package analyzes a PUBLISHED npm package (it fetches
# the package from the registry by name), so it cannot run as a git hook before
# the first publish — it will 404. Run it manually after publishing instead:
#   npx --yes @n8n/scan-community-package @nodrel-dev/n8n-nodes-ups
# The real local verification gate is `n8n-node lint` (strict mode), below.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,js,json}'
      run: npm run lint

commit-msg:
  commands:
    commitlint:
      run: npx --yes commitlint --edit {1}
